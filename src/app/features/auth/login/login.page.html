<section class="grid min-h-[calc(100vh-120px)] place-items-center px-4 py-10 sm:px-6 lg:px-8">
	<div class="grid w-full max-w-md gap-6 rounded-3xl border border-[#2a2724] bg-[#121212] p-8">
		<div class="grid gap-3">
			<p class="text-[0.6rem] uppercase tracking-[0.4em] text-[#b9b1a4]">identificacao</p>
			<h1 class="font-[family-name:var(--font-display)] text-4xl uppercase tracking-[0.15em] text-[#f4f1e6]">Entrar na drop</h1>
			<p class="text-sm text-[#b9b1a4]">Use seu email e senha para continuar.</p>
		</div>

		@if (message()) {
			<div class="rounded-xl border border-[#e5c77a] px-4 py-3 text-[0.7rem] uppercase tracking-[0.2em] text-[#e5c77a]">{{ message() }}</div>
		}

		<form [formGroup]="form" (ngSubmit)="submit()" class="grid gap-4">
			<label class="grid gap-2 text-[0.75rem] uppercase tracking-[0.2em] text-[#b9b1a4]">
				<span>Email</span>
				<input type="email" formControlName="email" placeholder="voce@email.com" class="rounded-xl border border-[#2a2724] bg-transparent px-4 py-3 text-[#f4f1e6] outline-none transition focus:border-[#e5c77a]" />
			</label>
			<label class="grid gap-2 text-[0.75rem] uppercase tracking-[0.2em] text-[#b9b1a4]">
				<span>Senha</span>
				<input type="password" formControlName="senha" placeholder="********" class="rounded-xl border border-[#2a2724] bg-transparent px-4 py-3 text-[#f4f1e6] outline-none transition focus:border-[#e5c77a]" />
			</label>

			<button type="submit" class="rounded-xl border border-[#e5c77a] bg-[#e5c77a] px-4 py-3 text-[0.65rem] uppercase tracking-[0.3em] text-[#0a0a0a] transition disabled:cursor-not-allowed disabled:opacity-60" [disabled]="loading()">
				{{ loading() ? 'Entrando...' : 'Entrar' }}
			</button>
		</form>

		<div class="flex items-center gap-2 text-sm text-[#b9b1a4]">
			<p>Sem conta?</p>
			<a routerLink="/create-profile" class="text-[#e5c77a] no-underline">Criar perfil</a>
		</div>
	</div>
</section>
