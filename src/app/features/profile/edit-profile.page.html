<section class="edit-shell">
  <div class="header">
    <p class="eyebrow">editar</p>
    <h1>Perfil</h1>
  </div>

  @if (message()) {
    <p class="info-banner">{{ message() }}</p>
  }

  <form [formGroup]="profileForm" class="form-grid">
    <label>
      <span>Nome</span>
      <input type="text" formControlName="nome" />
    </label>
    <label>
      <span>Email</span>
      <input type="email" formControlName="email" />
    </label>
    <label>
      <span>Telefone</span>
      <input type="text" formControlName="telefone" />
    </label>
    <label>
      <span>Endereco</span>
      <input type="text" formControlName="logradouro" />
    </label>
  </form>
  <button type="button" class="primary-btn" (click)="saveProfile()">Salvar</button>

  <div class="divider"></div>

  <form [formGroup]="passwordForm" class="form-grid">
    <label>
      <span>Nova senha</span>
      <input type="password" formControlName="senha" />
    </label>
  </form>
  <button type="button" class="ghost-btn" (click)="changePassword()">Alterar senha</button>
</section>
