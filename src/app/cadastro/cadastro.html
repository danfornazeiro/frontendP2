<div class="min-h-screen bg-[#0f0e0c] flex items-center justify-center px-4 py-16 font-sans">
  <div
    class="fixed inset-0 opacity-[0.04] pointer-events-none"
    style="
      background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 256 256%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noise%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.9%22 numOctaves=%224%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noise)%22/%3E%3C/svg%3E');
    "
  ></div>

  <div class="w-full max-w-md relative">
    <div class="h-px w-24 bg-[#e8d5a3] mb-10 ml-1"></div>

    <div class="mb-10 pl-1">
      <p class="text-[#6b6456] text-xs tracking-[0.25em] uppercase mb-2">Novo registro</p>
      <h2 class="font-[family-name:var(--font-display)] text-4xl font-light tracking-tight text-[#f0e6cc]">
        Cadastro
      </h2>
    </div>

    <div *ngIf="mensagem" class="mb-8 pl-4 border-l-2 border-[#e8d5a3]">
      <p class="text-[#e8d5a3] text-sm tracking-wide">{{ mensagem }}</p>
    </div>

    <div class="space-y-6">
      <div class="group">
        <label class="block text-[#6b6456] text-[10px] tracking-[0.2em] uppercase mb-2"
          >Código</label
        >
        <input
          type="number"
          [(ngModel)]="obj.codigo"
          class="w-full bg-transparent border-b border-[#2a2720] text-[#f0e6cc] text-sm py-2.5 px-0 placeholder-[#3a342c] outline-none focus:border-[#e8d5a3] transition-colors duration-300 [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none"
          placeholder="—"
        />
      </div>

      <div class="group">
        <label class="block text-[#6b6456] text-[10px] tracking-[0.2em] uppercase mb-2">Nome</label>
        <input
          type="text"
          [(ngModel)]="obj.nome"
          class="w-full bg-transparent border-b border-[#2a2720] text-[#f0e6cc] text-sm py-2.5 px-0 placeholder-[#3a342c] outline-none focus:border-[#e8d5a3] transition-colors duration-300"
          placeholder="Nome completo"
        />
      </div>

      <div class="group">
        <label class="block text-[#6b6456] text-[10px] tracking-[0.2em] uppercase mb-2"
          >E-mail</label
        >
        <input
          type="text"
          [(ngModel)]="obj.email"
          class="w-full bg-transparent border-b border-[#2a2720] text-[#f0e6cc] text-sm py-2.5 px-0 placeholder-[#3a342c] outline-none focus:border-[#e8d5a3] transition-colors duration-300"
          placeholder="seu@email.com"
        />
      </div>

      <div class="group">
        <label class="block text-[#6b6456] text-[10px] tracking-[0.2em] uppercase mb-2"
          >Senha</label
        >
        <input
          type="password"
          [(ngModel)]="obj.senha"
          class="w-full bg-transparent border-b border-[#2a2720] text-[#f0e6cc] text-sm py-2.5 px-0 placeholder-[#3a342c] outline-none focus:border-[#e8d5a3] transition-colors duration-300"
          placeholder="••••••••"
        />
      </div>

      <div class="group">
        <label class="block text-[#6b6456] text-[10px] tracking-[0.2em] uppercase mb-2"
          >Telefone</label
        >
        <input
          type="text"
          [(ngModel)]="obj.telefone"
          class="w-full bg-transparent border-b border-[#2a2720] text-[#f0e6cc] text-sm py-2.5 px-0 placeholder-[#3a342c] outline-none focus:border-[#e8d5a3] transition-colors duration-300"
          placeholder="(00) 00000-0000"
        />
      </div>

      <div class="group">
        <label class="block text-[#6b6456] text-[10px] tracking-[0.2em] uppercase mb-2"
          >Endereço</label
        >
        <textarea
          [(ngModel)]="obj.logradouro"
          rows="3"
          class="w-full bg-transparent border-b border-[#2a2720] text-[#f0e6cc] text-sm py-2.5 px-0 placeholder-[#3a342c] outline-none resize-none focus:border-[#e8d5a3] transition-colors duration-300"
          placeholder="Rua, número, bairro..."
        ></textarea>
      </div>
    </div>

    <div class="mt-12 flex items-center gap-6">
      <button
        (click)="gravar()"
        class="group relative px-10 py-3.5 bg-[#e8d5a3] text-[#0f0e0c] text-xs tracking-[0.2em] uppercase font-medium hover:bg-[#f0e6cc] active:scale-[0.98] transition-all duration-200 overflow-hidden"
      >
        <span class="relative z-10">Gravar</span>
      </button>
      <div class="h-px flex-1 bg-[#1e1c18]"></div>
    </div>

    <div class="h-px w-8 bg-[#2a2720] mt-10 ml-1"></div>
  </div>
</div>
